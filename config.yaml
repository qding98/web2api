server:
  # 监听地址 / Listening address
  # 本机开发建议 127.0.0.1；Docker/容器内建议 0.0.0.0
  # Use 127.0.0.1 for local dev; use 0.0.0.0 inside Docker/container
  host: '127.0.0.1'
  port: 9000

auth:
  # 对外 API 鉴权开关：留空表示不启用；填写后，所有 /{type}/v1/* 请求都必须带匹配的 API Key。
  # External API auth: leave empty to disable; once set, all /{type}/v1/* requests must carry a matching API Key.
  # 推荐客户端使用 / Recommended client usage:
  #   Authorization: Bearer <api_key>
  # 支持三种写法 / Supports three formats:
  #   api_key: "key-1"
  #   api_key: "key-1,key-2"
  #   api_key:
  #     - "key-1"
  #     - "key-2"
  # 仅保护 OpenAI 兼容接口，不用于配置页登录。/ Only protects OpenAI-compatible endpoints; not used for config page login.
  # 修改后需要重启服务生效。/ Changes take effect after restarting the service.
  api_key: ''

  # 配置页登录密钥：留空表示不启用配置页；填写明文后，项目启动时会自动转换成哈希并回写到当前 config.yaml。
  # Config page login secret: leave empty to disable; plain text will be auto-hashed and written back to config.yaml on startup.
  # 之后访问 /config 时，需要先到 /login 输入这里最初配置的明文 secret。
  # To access /config, go to /login first and enter the original plain-text secret configured here.
  # 修改 secret 的方式：把这里重新改成新的明文，再重启服务；启动后会再次自动哈希。
  # To change the secret: replace this with new plain text, then restart; it will be re-hashed on startup.
  # 注意：如果未配置 config_secret，/config 与 /api/config 将不可访问。
  # Note: if config_secret is not set, /config and /api/config will be inaccessible.
  config_secret: ''
  # 配置页登录失败保护：按来源 IP 统计，连续失败达到阈值后临时锁定。
  # Login failure protection: tracked per source IP; temporarily locked after consecutive failures reach the threshold.
  config_login_max_failures: 5
  config_login_lock_seconds: 600

browser:
  # 指纹浏览器（fingerprint-chromium）可执行文件路径
  # Path to the fingerprint-chromium executable
  # 留空则按系统自动探测；也可用 WEB2API_CHROMIUM_BIN 环境变量覆盖。
  # Leave empty for OS auto-detection; WEB2API_CHROMIUM_BIN can override it.
  # Windows 示例：C:\Program Files\fingerprint-chromium\chrome.exe
  # Windows example: C:\Program Files\fingerprint-chromium\chrome.exe
  # Linux 示例：/usr/bin/chromium 或 /opt/fingerprint-chromium/chrome
  # Linux examples: /usr/bin/chromium or /opt/fingerprint-chromium/chrome
  chromium_bin: ''

  # 是否启用无头模式（headless）/ Whether to enable headless mode
  # 默认 false。优先推荐 Linux + Xvfb，这样仍然是"有界面浏览器"，兼容性更稳。
  # Default false. Linux + Xvfb is preferred — keeps a visible browser with better compatibility.
  # headless 只建议用于检测不严格、页面行为简单的平台。
  # Headless is only recommended for platforms with lenient detection and simple page behavior.
  # 对 Claude 这类检测更严格的平台，不推荐优先开启；可能出现扩展失效、登录态异常或更高风控风险。
  # Not recommended for stricter platforms like Claude; may cause extension failures, session issues, or higher risk triggers.
  headless: false

  # 是否禁用 Chromium sandbox / Whether to disable Chromium sandbox
  # 默认 false。只有在 Docker 等受限环境、且浏览器因 sandbox 无法启动时再开启。
  # Default false. Only enable in restricted environments (e.g. Docker) where the browser fails to start due to sandbox.
  # 开启后安全性会下降，但容器内通常更容易稳定启动浏览器。
  # Enabling reduces security, but typically allows stable browser startup inside containers.
  no_sandbox: false

  # 是否显式禁用 GPU / Whether to explicitly disable GPU
  # 默认 false。Linux 容器、远程桌面、Xvfb 等环境里，如果浏览器出现 GPU 相关崩溃，可尝试开启。
  # Default false. Try enabling in Linux containers, remote desktops, or Xvfb if GPU-related crashes occur.
  # 注意：这更像兼容性开关，不保证解决所有环境问题；对 Apple Silicon Docker + x86_64 浏览器这类跨架构场景尤其如此。
  # Note: compatibility switch only; does not guarantee fixes for all envs, especially cross-arch (Apple Silicon + x86_64).
  disable_gpu: false

  # 是否禁用 GPU sandbox / Whether to disable GPU sandbox
  # 默认 false。仅在浏览器日志明确指向 GPU 进程 / GPU sandbox 问题时再开启。
  # Default false. Only enable when browser logs explicitly point to GPU process / GPU sandbox issues.
  # 建议和 disable_gpu 配合排查；正常桌面环境通常不需要。
  # Recommended alongside disable_gpu for troubleshooting; not needed in normal desktop environments.
  disable_gpu_sandbox: false

  # CDP 端口池：每个浏览器进程占用一个端口 / CDP port pool: one port per browser process
  # cdp_port_start: 起始端口（默认 9223）/ Start port (default 9223)
  # cdp_port_count: 端口数量，即最多可并发的浏览器数（默认 20）/ Port count = max concurrent browsers (default 20)
  cdp_port_start: 9223
  cdp_port_count: 20

  # CDP readiness wait settings (tune for slow/cold starts in Docker)
  # Total wait time ≈ cdp_wait_max_attempts * cdp_wait_interval_seconds
  cdp_wait_max_attempts: 60
  cdp_wait_interval_seconds: 2.0
  # Per-attempt TCP connect timeout when probing the CDP port
  cdp_wait_connect_timeout_seconds: 2.0

scheduler:
  # 单个 type tab 同时允许的最大请求数。
  # Maximum concurrent requests allowed per type tab.
  # 达到上限后，新请求会优先分流到其他已打开浏览器，必要时再拉起新浏览器。
  # When the limit is reached, new requests are routed to other open browsers; a new one is launched only if necessary.
  tab_max_concurrent: 5

  # 同一账号两次请求开始之间的最小间隔（秒），用于降低网页端短窗口频率限制。
  # Minimum interval between request starts for the same account (seconds).
  account_min_interval_seconds: 10

  # 已存在会话命中 busy 状态时，每次重试前的等待时间（秒）。
  # Wait before retrying when an existing session is still marked busy (seconds).
  session_busy_wait_seconds: 1

  # 已存在会话命中 busy 状态时，单次请求最多等待多久（秒）。
  # Maximum wait for a busy existing session before failing (seconds).
  session_busy_max_wait_seconds: 20

  # busy 会话标记的兜底过期时间（秒），用于清理异常残留的会话锁。
  # Failsafe TTL for busy session markers to clean up stale session locks (seconds).
  session_busy_stale_seconds: 600

  # 续写请求进入真正流式输出前的准备阶段最长等待时间（秒）。
  # Maximum wait before the plugin yields the first streaming chunk at all (seconds).
  stream_prepare_timeout_seconds: 30

  # 流式响应首个数据块最长等待时间（秒），超过后直接返回错误，避免长时间无响应。
  # Maximum wait for the first streaming chunk before failing fast (seconds).
  stream_first_chunk_timeout_seconds: 30

  # 流式响应开始后，连续多久没有新数据就判为超时（秒）。
  # Maximum idle time after streaming starts before treating it as stalled (seconds).
  stream_no_data_timeout_seconds: 15

  # 浏览器空闲回收扫描周期（秒）/ Browser idle GC scan interval (seconds)
  browser_gc_interval_seconds: 300

  # 一个浏览器下所有 tab 在这段时间内都没有请求时，视为可回收（秒）
  # A browser is reclaimable when all its tabs have been idle for this duration (seconds)
  tab_idle_seconds: 900

  # 最少保留多少个浏览器进程不参与回收 / Minimum number of browser processes to keep alive (exempt from GC)
  resident_browser_count: 1

# 通常情况无需配置，用于调试时指向 mock 服务 / Usually no need to configure; used to point to mock service during debugging
claude:
  # Claude Web2API 入口地址，用于浏览器打开站点（可指向 mock 服务）
  # Claude Web2API entry URL used by the browser to open the site (can point to mock service)
  # 生产环境使用默认值；调试时可指向 mock 服务，例如：
  # Use default in production; for debugging, point to mock, e.g.:
  #   start_url: "http://127.0.0.1:8002/mock"
  start_url: ''

  # Claude API 基础地址，用于调用 /api/... 接口（可指向 mock 服务）
  # Claude API base URL for calling /api/... endpoints (can point to mock service)
  # 生产环境使用默认值；调试时可指向 mock 服务，例如：
  # Use default in production; for debugging, point to mock, e.g.:
  #   api_base: "http://127.0.0.1:8002/mock"
  api_base: ''

  # Claude 返回 429 但没有 reset header 时的 fallback 冷却时间（秒）。
  # Fallback cooldown when Claude returns 429 without a reset header (seconds).
  rate_limit_fallback_cooldown_seconds: 60

  # 创建会话前获取账号上下文（/api/account）的超时时间（秒）。
  # Timeout for fetching account context (/api/account) before creating a conversation (seconds).
  account_context_timeout_seconds: 12

  # OpenAI 兼容模型名 -> 实际模型 ID，用于 /v1/models 列表及请求时的模型解析
  # OpenAI-compatible model name -> actual model ID, used for /v1/models listing and model resolution on requests
  model_mapping:
    s4: claude-sonnet-4-5-20250929

anything:
  # Anything Web 页面入口，用于浏览器打开站点并维持真实网页登录态。
  # Anything Web page entry URL used by the browser to keep real web-session state.
  # 生产环境留空使用默认值：https://www.anything.com
  start_url: ''

  # Anything API 基础地址。生产环境留空使用默认值：https://www.anything.com/api
  # Anything API base URL. Leave empty in production to use https://www.anything.com/api
  api_base: ''

  # GraphQL 路径，通常无需修改。
  # GraphQL path; usually no need to change.
  graphql_path: '/graphql'

  # 当前适配优先支持“已有 Anything 项目继续对话”。
  # 可在账号 auth JSON 中配置 projectGroupId/threadId；这里是全局兜底。
  # Existing-project chat is the default supported mode.
  # Per-account auth JSON may override projectGroupId/threadId; these are global fallbacks.
  default_project_group_id: ''
  default_thread_id: ''

  # Anything 前端存储 token 的 localStorage key 候选。若你抓包发现 key 不同，可在账号 auth 里用 authorizationStorageKey 覆盖。
  # Candidate localStorage keys for Anything auth token. Override per account with authorizationStorageKey if needed.
  authorization_storage_keys:
    - authorization
    - access_token
    - accessToken
    - token

  # 如果 Anything 前端 GraphQL input 字段变化，可在这里或账号 auth JSON 中配置 generateInputTemplate。
  # 支持占位符：{message}、{project_group_id}、{projectGroupId}、{thread_id}、{threadId}、{timezone}、{session_id}
  # If Anything changes GraphQL input fields, configure generateInputTemplate here or in account auth JSON.
  generate_input_template: {}

  # 请求与轮询超时。生成任务可能较慢，poll_timeout_seconds 可按 Anything 生成耗时调大。
  # Request/polling timeouts. Increase poll_timeout_seconds for slower app generations.
  request_timeout_seconds: 30
  poll_interval_seconds: 2
  poll_timeout_seconds: 180
  rate_limit_fallback_cooldown_seconds: 60

  # 生成任务接受后先输出一个空 chunk，避免长生成在首包阶段被调度器误判超时。
  # Emit an empty chunk once accepted to avoid scheduler first-chunk timeout on long generations.
  yield_empty_on_accepted: true

  # 切号时是否清除 .anything.com cookies。默认 false，避免误删站点风控/挑战 cookie。
  # Whether to clear .anything.com cookies when switching accounts. Default false preserves challenge cookies.
  clear_existing_cookies: false

  # OpenAI 兼容模型名 -> 实际模型 ID，用于 /v1/models 列表及请求时的模型解析。
  # OpenAI-compatible model name -> actual model ID.
  model_mapping:
    anything: anything-web

mock:
  port: 8002
